<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which Game Should You Play? | Vortex Gaming Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vortex-black: #0B0C10;
            --deep-space: #1F2833;
            --electric-cyan: #66FCF1;
            --cyber-teal: #45A29E;
            --plasma-purple: #B026FF;
            --toxic-green: #39FF14;
            --pure-white: #FFFFFF;
            --silver-mist: #C5C6C7;
        }

        body {
            background-color: var(--vortex-black);
            color: var(--pure-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            z-index: 10;
        }

        .quiz-card {
            background-color: var(--deep-space);
            border: 1px solid #2d3748;
            padding: 60px 40px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--electric-cyan), transparent);
        }

        h1, h2, h3 {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        h1 { font-size: 3rem; color: var(--electric-cyan); margin-bottom: 10px; }
        
        .question {
            font-size: 1.8rem;
            margin-bottom: 40px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .btn {
            background: var(--vortex-black);
            color: var(--pure-white);
            border: 1px solid var(--cyber-teal);
            padding: 18px 25px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            clip-path: polygon(3% 0, 100% 0, 97% 100%, 0 100%);
            font-family: 'Inter', sans-serif;
        }

        .btn:hover, .btn.selected {
            border-color: var(--electric-cyan);
            background: var(--deep-space);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
            transform: translateX(5px);
        }

        .btn-primary {
            background-color: var(--electric-cyan);
            color: var(--vortex-black);
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Rajdhani', sans-serif;
            margin-top: 30px;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }

        #result-card {
            display: none;
            text-align: center;
        }

        .game-title {
            font-size: 4rem;
            color: var(--electric-cyan);
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.5);
            margin: 20px 0;
        }

        .game-img {
            max-width: 100%;
            height: 300px;
            object-fit: cover;
            border: 1px solid var(--electric-cyan);
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .vortex-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, rgba(102, 252, 241, 0.05) 0%, transparent 70%);
            z-index: 1;
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .silver { color: var(--silver-mist); }
    </style>
</head>
<body>
    <div class="vortex-bg"></div>
    <div class="container">
        <div class="quiz-card" id="quiz-box">
            <h1>Vortex Match</h1>
            <p class="silver" style="text-align: center; margin-bottom: 40px;">Find your next digital obsession.</p>
            
            <div id="quiz-content">
                <div class="question">Ready to enter the Vortex?</div>
                <div class="text-center" style="text-align: center;">
                    <button class="btn" style="text-align: center; width: 100%;" onclick="startQuiz()">Initialize Quiz System</button>
                </div>
            </div>
            
            <button id="next-btn" class="btn btn-primary" onclick="handleNext()">Next</button>
        </div>

        <div class="quiz-card" id="result-card">
            <h2>Your Destiny Awaits</h2>
            <div class="game-title" id="game-name"></div>
            <img src="" alt="" class="game-img" id="game-image">
            <p class="silver" id="game-desc" style="font-size: 1.2rem; margin-bottom: 30px;"></p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button class="btn" onclick="location.reload()">Reset</button>
                <button class="btn" style="background: var(--electric-cyan); color: var(--vortex-black); font-weight: bold;" onclick="alert('Redirecting to guides...')">Guides</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "Select your tactical platform:",
                options: [
                    { t: "High-End PC Rig", s: { pc: 10 } },
                    { t: "Mobile / Handheld", s: { mobile: 10 } },
                    { t: "Next-Gen Console", s: { console: 10 } }
                ]
            },
            {
                q: "Operational tempo preference:",
                options: [
                    { t: "High intensity / Competitive", s: { competitive: 10 } },
                    { t: "Strategic / Deep Narrative", s: { story: 10 } },
                    { t: "Creative / Sandbox", s: { creative: 10 } }
                ]
            },
            {
                q: "Squad requirements:",
                options: [
                    { t: "Coordinated Team Play", s: { team: 10 } },
                    { t: "Lone Wolf Operations", s: { solo: 10 } }
                ]
            },
            {
                q: "Preferred environment:",
                options: [
                    { t: "Fantasy / Mythical", s: { fantasy: 10 } },
                    { t: "Sci-Fi / Digital", s: { scifi: 10 } },
                    { t: "Modern / Realistic", s: { realistic: 10 } }
                ]
            },
            {
                q: "Engagement duration:",
                options: [
                    { t: "Quick Skirmishes (20 min)", s: { short: 10 } },
                    { t: "Extended Campaigns (Hours)", s: { long: 10 } }
                ]
            }
        ];

        const games = [
            {
                name: "Valorant",
                desc: "Precision tactical shooting on PC. Master unique abilities and outsmart the opposition.",
                img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800",
                match: (s) => s.pc && s.competitive && s.team
            },
            {
                name: "PUBG Mobile",
                desc: "Battle royale mastery on the go. Survival is the only objective in this realistic shooter.",
                img: "https://images.unsplash.com/photo-1552824236-0776484ff23b?auto=format&fit=crop&q=80&w=800",
                match: (s) => s.mobile && s.realistic
            },
            {
                name: "Elden Ring",
                desc: "An epic journey through a dark fantasy world. Challenge yourself against legendary foes.",
                img: "https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?auto=format&fit=crop&q=80&w=800",
                match: (s) => (s.pc || s.console) && s.story && s.fantasy
            },
            {
                name: "Minecraft",
                desc: "Infinite possibilities. Build, survive, and explore a world shaped entirely by you.",
                img: "https://images.unsplash.com/photo-1607988523113-231da316049a?auto=format&fit=crop&q=80&w=800",
                match: (s) => s.creative
            },
            {
                name: "Free Fire",
                desc: "Fast-paced mobile survival. 10 minutes, 50 players, 1 survivor.",
                img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=800",
                match: (s) => s.mobile && s.short
            },
            {
                name: "Cyberpunk 2077",
                desc: "Become a urban mercenary in the neon-soaked streets of Night City.",
                img: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&q=80&w=800",
                match: (s) => s.scifi && s.story
            }
        ];

        let currentIdx = 0;
        let scores = {};

        function startQuiz() {
            currentIdx = 0;
            scores = {};
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentIdx];
            const content = document.getElementById('quiz-content');
            const nextBtn = document.getElementById('next-btn');
            nextBtn.style.display = "none";

            let optionsHtml = data.options.map((opt, i) => `
                <button class="btn" onclick="selectOption(${i}, '${JSON.stringify(opt.s)}')">${opt.t}</button>
            `).join('');

            content.innerHTML = `
                <div class="question">Phase ${currentIdx + 1}: ${data.q}</div>
                <div class="options">${optionsHtml}</div>
            `;
        }

        function selectOption(idx, scoreStr) {
            const btns = document.querySelectorAll('.options .btn');
            btns.forEach(b => b.classList.remove('selected'));
            btns[idx].classList.add('selected');
            
            const score = JSON.parse(scoreStr);
            tempScore = score;
            
            document.getElementById('next-btn').style.display = "block";
        }

        let tempScore = {};

        function handleNext() {
            for (let k in tempScore) {
                scores[k] = (scores[k] || 0) + tempScore[k];
            }
            
            currentIdx++;
            if (currentIdx < quizData.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-box').style.display = "none";
            document.getElementById('result-card').style.display = "block";
            
            let bestMatch = games[0];
            for (let game of games) {
                if (game.match(scores)) {
                    bestMatch = game;
                    break;
                }
            }

            document.getElementById('game-name').innerText = bestMatch.name;
            document.getElementById('game-desc').innerText = bestMatch.desc;
            document.getElementById('game-image').src = bestMatch.img;
        }
    </script>
</body>
</html>
