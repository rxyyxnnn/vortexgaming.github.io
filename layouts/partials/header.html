<header class="site-header">
    <div class="container">
        <div class="header-inner">
            <div class="logo">
                <a href="/">
                    <span class="vortex-v">V</span>
                    <span class="site-name">VORTEX <small>GAMING HUB</small></span>
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    {{ range .Site.Menus.main }}
                    <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                    {{ end }}
                </ul>
            </nav>
            <div class="header-actions">
                <a href="#" class="btn btn-outline">Join Discord</a>
            </div>
        </div>
    </div>
</header>
